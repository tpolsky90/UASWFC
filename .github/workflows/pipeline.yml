# UASWFC Event-Driven Pipeline
#
# Primary trigger: Cloudflare Worker webhook router fires repository_dispatch
#   survey_submitted    -> Execute AGOL Notebook to process the submission
#   processing_complete -> Download deliverables, email to pilot with approve/revision links
#   submission_approved -> Distribute to FTP + wider email list (future)
#
# Fallback: 5-minute cron polls for any missed webhooks
#
# Required Secrets:
#   AGOL_USERNAME, AGOL_PASSWORD, GMAIL_APP_PASSWORD, NOTEBOOK_ITEM_ID, PAT_TOKEN

name: UASWFC Pipeline

on:
  repository_dispatch:
    types:
      - survey_submitted
      - processing_complete
      - submission_approved
      - test_ping

  workflow_dispatch:
    # Manual trigger for testing
    inputs:
      job_to_run:
        description: 'Which job to run'
        required: true
        default: 'email_pilot'
        type: choice
        options:
          - execute_notebook
          - email_pilot
          - distribute

jobs:

  # -----------------------------------------------------------------
  # JOB 1: Execute Notebook (triggered by Survey123 submission)
  # Queries for pending records first. Skips if nothing to process.
  # Concurrency group ensures only one Notebook runs at a time.
  # -----------------------------------------------------------------
  execute_notebook:
    if: >
      github.event_name == 'repository_dispatch' && 
      github.event.action == 'survey_submitted' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && 
      github.event.inputs.job_to_run == 'execute_notebook'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: notebook-execution
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Execute AGOL Notebook
        env:
          AGOL_USERNAME: ${{ secrets.AGOL_USERNAME }}
          AGOL_PASSWORD: ${{ secrets.AGOL_PASSWORD }}
          NOTEBOOK_ITEM_ID: ${{ secrets.NOTEBOOK_ITEM_ID }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scripts/execute_notebook.py

  # -----------------------------------------------------------------
  # JOB 2: Email pilot (triggered by Notebook completion or schedule)
  # Queries for awaiting_approval records. Skips if nothing to process.
  # -----------------------------------------------------------------
  email_pilot:
    if: >
      github.event_name == 'repository_dispatch' && 
      github.event.action == 'processing_complete' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && 
      github.event.inputs.job_to_run == 'email_pilot'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Download deliverables and email pilot
        env:
          AGOL_USERNAME: ${{ secrets.AGOL_USERNAME }}
          AGOL_PASSWORD: ${{ secrets.AGOL_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/email_pilot.py

  # -----------------------------------------------------------------
  # JOB 3: Distribute (triggered by pilot approval) -- FUTURE
  # -----------------------------------------------------------------
  distribute:
    if: >
      github.event_name == 'repository_dispatch' && 
      github.event.action == 'submission_approved' ||
      github.event_name == 'workflow_dispatch' && 
      github.event.inputs.job_to_run == 'distribute'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Distribute approved deliverables
        env:
          AGOL_USERNAME: ${{ secrets.AGOL_USERNAME }}
          AGOL_PASSWORD: ${{ secrets.AGOL_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/distribute.py

  # -----------------------------------------------------------------
  # TEST: Acknowledge test pings
  # -----------------------------------------------------------------
  test_ping:
    if: >
      github.event_name == 'repository_dispatch' && 
      github.event.action == 'test_ping'
    runs-on: ubuntu-latest
    steps:
      - name: Ping received
        run: |
          echo "Test ping received"
          echo "Payload: ${{ toJson(github.event.client_payload) }}"
